upstream curevie_backend {
    server backend:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name api.curevie.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.curevie.net;

    ssl_certificate /etc/letsencrypt/live/api.curevie.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.curevie.net/privkey.pem;

    location /api/ {
        limit_req zone=api burst=100 nodelay;
        proxy_pass http://curevie_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /uploads/ {
        proxy_pass http://curevie_backend;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /api/v1/health {
        proxy_pass http://curevie_backend;
        access_log off;
    }

    location / {
        return 444;
    }
}
