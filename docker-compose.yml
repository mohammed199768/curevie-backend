services:
  postgres:
    image: postgres:16-alpine
    container_name: curevie_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [curevie_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: curevie_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    networks: [curevie_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: curevie_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379
      DB_SSL: "false"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
      - assets_data:/app/assets
    networks: [curevie_net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s

  nginx:
    image: nginx:1.26-alpine
    container_name: curevie_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    networks: [curevie_net]
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  logs_data:
  assets_data:
  nginx_logs:

networks:
  curevie_net:
    driver: bridge
